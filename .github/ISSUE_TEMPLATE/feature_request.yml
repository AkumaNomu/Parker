name: Feature request
description: Propose a focused capture, OCR, clipboard, or workflow improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the workflow limitation rather than only the proposed implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true

  - type: textarea
    id: privacy
    attributes:
      label: Privacy and dependency implications
      description: Explain whether the feature needs network access, cloud processing, elevated permissions, or a new runtime.
    validations:
      required: true
