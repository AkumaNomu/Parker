name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles("**/Cargo.lock") }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run clippy and rustfmt
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings

      # Build the project in release mode
      - name: Build release binary
        run: cargo build --release

      # Package the binary (and any required assets) into a zip file
      - name: Create zip archive
>>>>>>> 8bcf7a1 (Implement audio recording, hotkey configuration, batch processing, CI improvements and fix hotkey type errors)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Verify release tag
        shell: powershell
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^\"]+)"').Matches[0].Groups[1].Value
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match Cargo version v$version"
          }

      - name: Run release checks
        shell: powershell
        run: .\scripts\check.ps1

      - name: Build release package
        shell: powershell
        run: .\scripts\package-release.ps1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            release/*.exe
            release/*.zip
            release/*.sha256
          generate_release_notes: true
